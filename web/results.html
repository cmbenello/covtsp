<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Viewer — covtsp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Nav -->
    <nav class="nav">
        <a href="index.html" class="nav-brand">covtsp</a>
        <div class="nav-right">
            <span id="meta-city" class="nav-meta">--</span>
            <span class="nav-sep">/</span>
            <span id="meta-date" class="nav-meta">--</span>
            <button id="export-btn" class="btn-export hidden">Export PNG</button>
        </div>
    </nav>

    <!-- File loader -->
    <div id="loader" class="loader">
        <div class="loader-inner">
            <h1 class="loader-title">Load a route</h1>
            <p class="loader-hint">Output from <code>python cli.py solve</code></p>
            <label class="btn-primary">
                Choose JSON File
                <input type="file" id="file-input" accept=".json" class="hidden">
            </label>
            <button id="load-sample" class="btn-secondary">Load sample route</button>
        </div>
    </div>

    <!-- Main content -->
    <div id="results" class="hidden">
        <!-- Export card (captured as PNG) -->
        <div id="export-card">
            <div id="map"></div>

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat">
                    <span id="stat-time" class="stat-value accent">--</span>
                    <span class="stat-label">Total Time</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span id="stat-stations" class="stat-value">--</span>
                    <span class="stat-label">Stations</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span id="stat-gap" class="stat-value accent">--</span>
                    <span class="stat-label">Optimality Gap</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat">
                    <span id="stat-bound" class="stat-value">--</span>
                    <span class="stat-label">LP Bound</span>
                </div>
            </div>

            <!-- Watermark (shown only during export) -->
            <div id="watermark" class="watermark hidden">
                <span>covtsp</span>
                <span class="watermark-sep">|</span>
                <span id="wm-city">--</span>
                <span class="watermark-sep">|</span>
                <span id="wm-date">--</span>
            </div>
        </div>

        <!-- Animation controls -->
        <div id="animation-controls" class="anim-bar hidden">
            <button id="anim-play" class="btn-play">Play</button>
            <input id="anim-speed" type="range" min="1" max="10" value="5" class="anim-slider">
            <span id="anim-speed-label" class="anim-label">5x</span>
            <span id="anim-progress" class="anim-label muted">0 stations</span>
        </div>

        <!-- Meta -->
        <div class="meta-bar">
            <span>Graph: <strong id="meta-graph">--</strong></span>
            <span>Start: <strong id="meta-start">--</strong></span>
        </div>

        <!-- Timeline -->
        <div class="timeline-section">
            <div class="timeline-header">
                <span class="th-num">#</span>
                <span class="th-time">Time</span>
                <span class="th-station">Station</span>
                <span class="th-line">Line</span>
            </div>
            <div id="timeline" class="timeline-list"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <script src="main.js"></script>
</body>
</html>
