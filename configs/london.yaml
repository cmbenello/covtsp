city_name: London Underground
gtfs_url: https://data.bus-data.dft.gov.uk/timetable/download/gtfs-file/london/
gtfs_path: london
station_count: 272
route_type_filter: [1]  # 1 = Metro/Subway
walking_speed_kmh: 5.0
max_walk_distance_m: 20000  # 20km covers even long running legs between stations
running_speed_kmh: 18.0    # base running speed (piecewise: 22/18/14 km/h by distance) — super athletic young male, ~10k in 33min
movement_mode: run          # "walk" or "run" — run mode for tube challenge
start_station: null  # solver picks best start
time_window:
  start: "05:30"
  end: "00:30"
excluded_stations: []
merge_stations:
  - ["940GZZLUPAH", "940GZZLUPAC"]   # Paddington H&C → Paddington main
  - ["9400ZZLUSBC2", "940GZZLUSBC"]   # Shepherd's Bush Central orphan → parent
use_google_walking: true
